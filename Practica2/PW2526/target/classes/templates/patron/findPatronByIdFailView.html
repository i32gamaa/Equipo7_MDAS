<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Patrón No Encontrado</title>
    <link rel="stylesheet" href="stylefail.css">
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>

        <h2 class="titulo-error-w">Patrón No Encontrado</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span>NO SE ENCONTRÓ EL PATRÓN SOLICITADO</span>
        </div>

        <p th:text="${errorMessage}">No se encontró el patrón con el DNI proporcionado.</p>

        <div class="action-buttons">
            <a href="/findPatronById" class="btn btn-primary">
                <i class="fas fa-redo-alt"></i>
                Intentar de nuevo
            </a>
            <a href="/listPatrones" class="btn btn-outline-light">
                <i class="fas fa-list"></i>
                Ver Todos los Patrones
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                Volver al inicio
            </a>
        </div>
    </div>
</body>
</html>
