<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylefail.css">
    <title>Error al añadir socio</title>
    <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>

        <h2 class="titulo-error-w">Error al guardar los datos introducidos</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span>EL DNI INTRODUCIDO YA EXISTE EN LA BASE DE DATOS</span>
        </div>

        <p>Por favor, utilice un DNI diferente o verifique el existente.</p>

        <div class="action-buttons">
            <a th:href="@{/addPatron}" class="btn btn-primary">
                <i class="fas fa-redo-alt"></i>
                Intentar de nuevo
            </a>
            <a th:href="@{/listPatrones}" class="btn btn-primary">
                <i class="fas fa-list"></i>
                Ver Lista de Patrones
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                Volver al inicio
            </a>
        </div>
    </div>
</body>
</html>
