<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Patrones</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <div class="overlay">
        <h1>Lista de Patrones</h1>
        <p>Gestiona y visualiza todos los patrones del sistema</p>

        <section th:if="${patronList != null and not patronList.empty}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Fecha Nacimiento</th>
                        <th>Fecha Título</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patronItem : ${patronList}">
                        <td th:text="${patronItem.id}"></td>
                        <td th:text="${patronItem.name}"></td>
                        <td th:text="${patronItem.surname}"></td>
                        <td th:text="${patronItem.birthDate}"></td>
                        <td th:text="${patronItem.titleIssueDate}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section th:if="${patronList == null or patronList.empty}" class="no-data">
            <h3>No hay patrones registrados</h3>
            <p>No se encontraron patrones en el sistema.</p>
        </section>

        <nav class="btn-group">
            <a th:href="@{/addPatron}" class="btn btn-primary">Añadir Patrón</a>
            <a th:href="@{/assignPatronToBoat}" class="btn btn-outline-light">Asignar a Embarcación</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </nav>
    </div>
</body>
</html>
