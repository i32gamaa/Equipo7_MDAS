<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en Asignación</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>

<body>
    <main class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
        </div>

        <h2 class="error-title">Error en Asignación</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
            <span>No se pudo completar la asignación del patrón</span>
        </div>

        <p class="error-instruction">El patrón ya está asignado a otra embarcación.</p>

        <nav class="action-buttons">
            <a th:href="@{/assignPatronToBoat}" class="btn btn-primary">
                <i class="fas fa-redo-alt" aria-hidden="true"></i> Intentar Nuevamente
            </a>
            <a th:href="@{/listPatrones}" class="btn btn-primary">
                <i class="fas fa-list" aria-hidden="true"></i> Ver Patrones
            </a>
            <a th:href="@{/listEmbarcacion}" class="btn btn-primary">
                <i class="fas fa-ship" aria-hidden="true"></i> Ver Embarcaciones
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="fas fa-home" aria-hidden="true"></i> Volver al inicio
            </a>
        </nav>
    </main>
</body>
</html>
