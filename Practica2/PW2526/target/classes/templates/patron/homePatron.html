<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylehome.css">
  <title>Gestión de Patrones - Club Náutico</title>
  <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
  <div class="overlay">
    <h1>Gestión de Patrones</h1>
    <p>Registra, busca y gestiona patrones</p>

    <div class="action-grid">
      <div class="action-card">
        <i class="fa-solid fa-id-card"></i>
        <h5>Patrones</h5>
        <a href="/addPatron" class="btn btn-success btn-custom">Agregar</a>
        <a href="/findPatronById" class="btn btn-outline-light btn-custom">Buscar</a>
        <a href="/listPatrones" class="btn btn-outline-light btn-custom">Listar</a>
      </div>

      <div class="action-card">
        <i class="fa-solid fa-ship"></i>
        <h5>Asignaciones</h5>
        <a href="/assignPatronToBoat" class="btn btn-outline-light btn-custom">Asignar a Embarcación</a>
      </div>
    </div>

    <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
  </div>
</body>
</html>
