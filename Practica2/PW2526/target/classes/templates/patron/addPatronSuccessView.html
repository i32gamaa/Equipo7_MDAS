<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrón Añadido Exitosamente</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/success.css}">
</head>

<body>
    <main class="overlay">
        <h1>✅ Patrón Añadido Exitosamente</h1>
        <p class="subtitle" th:text="${infoMessage}">Patrón registrado correctamente en el sistema.</p>

        <section th:if="${patronItem != null}" class="details">
            <h3>Información del Patrón</h3>
            <table class="styled-table">
                <tbody>
                    <tr>
                        <th>DNI</th>
                        <td th:text="${patronItem.id}"></td>
                    </tr>
                    <tr>
                        <th>Nombre</th>
                        <td th:text="${patronItem.name}"></td>
                    </tr>
                    <tr>
                        <th>Apellidos</th>
                        <td th:text="${patronItem.surname}"></td>
                    </tr>
                    <tr>
                        <th>Fecha de Nacimiento</th>
                        <td th:text="${patronItem.birthDate}"></td>
                    </tr>
                    <tr>
                        <th>Fecha de Expedición del Título</th>
                        <td th:text="${patronItem.titleIssueDate}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <nav class="btn-group">
            <a th:href="@{/addPatron}" class="btn btn-primary">Añadir Otro Patrón</a>
            <a th:href="@{/listPatrones}" class="btn btn-outline-light">Ver Lista de Patrones</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </nav>
    </main>
</body>
</html>
