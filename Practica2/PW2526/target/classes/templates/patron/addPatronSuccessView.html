<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesuccess.css">
    <title>Patrón Añadido Exitosamente</title>
    <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
    <div class="overlay">
        <h1>✅ Patrón Añadido Exitosamente</h1>
        <p class="subtitle" th:text="${message}">Patrón registrado correctamente en el sistema.</p>

        <section class="details" th:if="${newPatron}">
            <h3>Información del Patrón</h3>
            <table class="styled-table">
                <tr><th>DNI</th><td th:text="${newPatron.id}"></td></tr>
                <tr><th>Nombre</th><td th:text="${newPatron.name}"></td></tr>
                <tr><th>Apellidos</th><td th:text="${newPatron.surname}"></td></tr>
                <tr><th>Fecha de Nacimiento</th><td th:text="${newPatron.birthDate}"></td></tr>
                <tr><th>Fecha de Expedición del Título</th><td th:text="${newPatron.titleIssueDate}"></td></tr>
            </table>
        </section>

        <div class="btn-group">
            <a th:href="@{/addPatron}" class="btn btn-primary">Añadir Otro Patrón</a>
            <a th:href="@{/listPatrones}" class="btn btn-outline-light">Ver Lista de Patrones</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </div>
    </div>
</body>
</html>
