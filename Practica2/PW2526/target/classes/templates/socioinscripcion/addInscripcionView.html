<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Añadir Socio Titular e Inscripción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylehome.css">
</head>
<body>
  <main class="overlay">
    <h1>Crear Inscripción</h1>

    <form th:action="@{/addInscripcion}" th:object="${newSocio}" method="post">
      <div class="form-group"><label>DNI</label><input type="text" th:field="*{id}" required></div>
      <div class="form-group"><label>Nombre</label><input type="text" th:field="*{name}" required></div>
      <div class="form-group"><label>Apellidos</label><input type="text" th:field="*{surname}" required></div>
      <div class="form-group"><label>Dirección</label><input type="text" th:field="*{address}" required></div>
      <div class="form-group"><label>Fecha Nacimiento</label><input type="date" th:field="*{birthdate}" required></div>
      <div class="form-group">
        <label>Título de Patrón</label>
        <select th:field="*{isBoatDriver}">
          <option th:value="true">Sí</option>
          <option th:value="false">No</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Guardar</button>
    </form>

    <div class="btn-group">
      <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
    </div>
  </main>
</body>
</html>
