<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Socios</title>
    <link rel="stylesheet" href="stylehome.css">
</head>
<body>
    <main class="overlay">
        <h1>Lista de Socios</h1>

        <div th:if="${error}" class="message error" th:text="${error}"></div>
        <div th:if="${message}" class="message info" th:text="${message}"></div>

        <section th:if="${socios} and ${not socios.empty}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Nacimiento</th>
                        <th>Dirección</th>
                        <th>Título Patrón</th>
                        <th>Titular</th>
                        <th>Insc</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="socio : ${socios}">
                        <td th:text="${socio.id}"></td>
                        <td th:text="${socio.name}"></td>
                        <td th:text="${socio.surname}"></td>
                        <td th:text="${socio.birthdate}"></td>
                        <td th:text="${socio.address}"></td>
                        <td th:text="${socio.isBoatDriver ? 'Sí' : 'No'}"></td>
                        <td th:text="${socio.isHolderInscription ? 'Sí' : 'No'}"></td>
                        <td th:text="${socio.inscriptionId}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div th:if="${socios == null or socios.empty}" class="no-data">
            No hay socios registrados.
        </div>

        <div class="btn-group">
            <a th:href="@{/addInscripcion}" class="btn btn-primary">Añadir Inscripción</a>
            <a th:href="@{/addSocio}" class="btn btn-secondary">Añadir Socio</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </div>
    </main>
</body>
</html>
