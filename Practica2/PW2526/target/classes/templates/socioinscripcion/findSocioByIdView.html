<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar Socio</title>
    <link rel="stylesheet" href="stylehome.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>
<body>
    <main class="overlay">
        <h1>Buscar Socio por ID</h1>

        <div th:if="${error}" class="message error" th:text="${error}"></div>

        <form th:action="@{/findSocioById}" method="post">
            <div class="form-group">
                <label for="id">DNI del Socio:</label>
                <input type="text" id="id" name="id" th:value="${param.id}" placeholder="Introduce el DNI" required>
            </div>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <div class="btn-group">
            <a th:href="@{/listSocios}" class="btn btn-secondary">Ver Todos los Socios</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </div>
    </main>
</body>
</html>
