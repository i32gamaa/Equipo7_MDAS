<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Socio Encontrado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesuccess.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>
<body>
    <main class="overlay">
        <h1>Socio Encontrado</h1>
        <p class="subtitle" th:text="${message}">Socio localizado correctamente.</p>

        <section class="details">
            <h3>Información del Socio</h3>
            <table class="styled-table">
                <tr><th>DNI</th><td th:text="${socio.id}"></td></tr>
                <tr><th>Nombre</th><td th:text="${socio.name}"></td></tr>
                <tr><th>Apellidos</th><td th:text="${socio.surname}"></td></tr>
                <tr><th>Dirección</th><td th:text="${socio.address}"></td></tr>
                <tr><th>Fecha Nacimiento</th><td th:text="${socio.birthdate}"></td></tr>
                <tr><th>Titular</th><td th:text="${socio.isHolderInscription} ? 'Sí' : 'No'"></td></tr>
                <tr><th>Patrón</th><td th:text="${socio.isBoatDriver} ? 'Sí' : 'No'"></td></tr>
                <tr><th>Adulto</th><td th:text="${socio.isAdult} ? 'Sí' : 'No'"></td></tr>
                <tr th:if="${socio.inscriptionId}"><th>ID Inscripción</th><td th:text="${socio.inscriptionId}"></td></tr>
            </table>
        </section>

        <div class="btn-group">
            <a th:href="@{/findSocioById}" class="btn btn-primary">Nueva Búsqueda</a>
            <a th:href="@{/listSocios}" class="btn btn-outline-light">Ver Todos</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </div>
    </main>
</body>
</html>
