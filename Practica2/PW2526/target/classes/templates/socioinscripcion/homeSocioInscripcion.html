<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylehome.css">
  <title>Gestión de Socios e Inscripciones - Club Náutico</title>
  <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
  <div class="overlay">
    <h1>Gestión de Socios e Inscripciones</h1>
    <p>Registra, busca y gestiona socios e inscripciones</p>

    <div class="action-grid">
      <div class="action-card">
        <i class="fa-solid fa-id-card"></i>
        <h5>Inscripciones</h5>
        <a href="/addInscripcion" class="btn btn-success btn-custom">Agregar</a>
        <a href="/findInscripcionById" class="btn btn-outline-light btn-custom">Buscar</a>
        <a href="/listInscripciones" class="btn btn-outline-light btn-custom">Listar</a>
      </div>

      <div class="action-card">
        <i class="fa-solid fa-user"></i>
        <h5>Socios</h5>
        <a href="/addSocio" class="btn btn-success btn-custom">Agregar</a>
        <a href="/findSocioById" class="btn btn-outline-light btn-custom">Buscar</a>
        <a href="/updateIsBoatDriver" class="btn btn-outline-light btn-custom">Actualizar título de patrón</a>
        <a href="/listSocios" class="btn btn-outline-light btn-custom">Listar</a>
      </div>
    </div>

    <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
  </div>
</body>

</html>
