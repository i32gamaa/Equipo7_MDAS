<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Encontrada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesuccess.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>
<body>
    <main class="overlay">
        <h1>Inscripción Encontrada</h1>
        <p class="subtitle" th:text="${message}">La inscripción fue localizada correctamente.</p>

        <section class="details">
            <h3>Información de la Inscripción</h3>
            <table class="styled-table">
                <tr><th>ID</th><td th:text="${inscripcion.id}"></td></tr>
                <tr><th>Fecha</th><td th:text="${inscripcion.date}"></td></tr>
                <tr><th>Cuota</th><td th:text="${inscripcion.totalAmount}"></td></tr>
                <tr><th>Titular</th><td th:text="${inscripcion.userId}"></td></tr>
                <tr><th>Adultos inscritos</th><td th:text="${inscripcion.registeredAdults}"></td></tr>
                <tr><th>Menores inscritos</th><td th:text="${inscripcion.registeredKids}"></td></tr>
            </table>
        </section>

        <div class="btn-group">
            <a th:href="@{/findInscripcionById}" class="btn btn-primary">Nueva Búsqueda</a>
            <a th:href="@{/listInscripciones}" class="btn btn-outline-light">Ver Todas</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </div>
    </main>
</body>
</html>
