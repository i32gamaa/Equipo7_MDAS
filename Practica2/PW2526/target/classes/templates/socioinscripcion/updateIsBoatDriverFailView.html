<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Error al Buscar Socio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylefail.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
    <main class="overlay error">
        <h1>Error al Actualizar Socio</h1>

        <div class="error-message">Se ha producido un error al actualizar el socio. Esto se puede
            deber a un error en el id introducido o a que el socio introducido ya tenía el título de patrón</div>

        <div class="btn-group">
            <a th:href="@{/updateIsBoatDriver}" class="btn btn-primary">Intentar de Nuevo</a>
            <a th:href="@{/listSocios}" class="btn btn-secondary">Ver Todos los Socios</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </div>
    </main>
</body>

</html>
