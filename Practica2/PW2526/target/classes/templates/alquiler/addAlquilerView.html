<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylehome.css">
    <title>Alquilar Embarcación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylehome.css">
    
    <style>
        .error-periodo {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            display: none;
        }
        .error-periodo h5 {
            color: #ff6b6b;
            margin-bottom: 8px;
            font-family: 'italianaregular';
        }
        .error-periodo p {
            margin: 5px 0;
            color: #ff8e8e;
        }
        .error-periodo small {
            color: #ffabab;
            font-style: italic;
        }
        
        .calculation-info {
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            display: none;
        }
        .calculation-info h5 {
            color: #00bfff;
            margin-bottom: 8px;
            font-family: 'italianaregular';
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h5 class="white">Alquilar Embarcación</h5>

        ' -->
        ', ya que las etiquetas <label> y el tipo de los inputs ya lo explican. -->
        <form th:action="@{/addAlquiler}" method="post" th:object="${alquilerForm}" id="alquilerForm">
            
            <div class="form-group">
                <label for="registrationNumber">Matrícula</label>
                <input type="text" id="registrationNumber" th:field="*{registrationNumber}" 
                       th:readonly="${embarcacion != null}" required>
            </div>

            <div class="form-group">
                <label for="userId">ID del Socio</label>
                <input type="text" id="userId" th:field="*{userId}" required>
            </div>

            <div class="form-group">
                <label for="startDate">Fecha de Inicio</label>
                <input type="date" id="startDate" th:field="*{startDate}" 
                       th:value="${alquilerForm.startDate != null} ? ${#temporals.format(alquilerForm.startDate, 'yyyy-MM-dd')} : ${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
            </div>

            <div class="form-group">
                <label for="endDate">Fecha de Fin</label>
                <input type="date" id="endDate" th:field="*{endDate}" 
                       th:value="${alquilerForm.endDate != null} ? ${#temporals.format(alquilerForm.endDate, 'yyyy-MM-dd')} : ''" required>
            </div>

            <div class="form-group position-relative">
                <label for="numSeats">
                    Número de Plazas
                    <span class="info-icon" id="infoIcon">?</span>
                </label>
                <input type="number" id="numSeats" th:field="*{numSeats}" min="1" max="20" required>
                <div class="tooltip-text" id="tooltipText">Precio por plaza por día = 20€</div>
            </div>

            <input type="hidden" id="amount" name="amount" th:field="*{amount}">

            <div id="errorPeriodo" class="error-periodo" style="grid-column: span 2;">
                <h5>❌ Periodo No Permitido</h5>
                <p id="errorText"></p>
                <small>Por favor, ajuste las fechas</small>
            </div>

            <div id="calculationInfo" class="calculation-info" style="grid-column: span 2;">
                <h5>✅ Período Válido</h5>
                <p><strong>Días de alquiler:</strong> <span id="diasAlquiler">0</span> días</p>
                <p><strong>Precio estimado:</strong> <span id="precioEstimado">0</span>€</p>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-3" style="grid-column: span 2;">
                <a th:href="@{/}" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-primary" id="submitBtn">Crear Alquiler</button>
            </div>
        </form>
    </div>

    <script>
        // REFACTORIZACIÓN:
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').setAttribute('min', today);
        document.getElementById('endDate').setAttribute('min', today);

        const errorPeriodo = document.getElementById('errorPeriodo');
        const errorText = document.getElementById('errorText');
        const calculationInfo = document.getElementById('calculationInfo');
        const diasAlquilerSpan = document.getElementById('diasAlquiler');
        const precioEstimadoSpan = document.getElementById('precioEstimado');
        const submitBtn = document.getElementById('submitBtn');

        let startDateSelected = false;
        let endDateSelected = false;

        function validateTemporalRestrictions() {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);
            const numSeats = parseInt(document.getElementById('numSeats').value) || 0;

            errorPeriodo.style.display = 'none';
            calculationInfo.style.display = 'none';
            submitBtn.disabled = false;

            if (!startDate || !endDate || isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
                return;
            }

            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            const startMonth = startDate.getMonth() + 1;

            const precio = diffDays * numSeats * 20;

            if ((startMonth >= 10 || startMonth <= 4) && diffDays > 3) {
                errorPeriodo.style.display = 'block';
                errorText.innerHTML = `<strong>Entre octubre y abril el máximo es de 3 días</strong><br>Días seleccionados: ${diffDays}`;
                submitBtn.disabled = true;
                return;
            }
            
            if (startMonth >= 5 && startMonth <= 9) {
                if (diffDays < 7) {
                    errorPeriodo.style.display = 'block';
                    errorText.innerHTML = `<strong>Entre mayo y septiembre el mínimo es de 1 semana (7 días)</strong><br>Días seleccionados: ${diffDays}`;
                    submitBtn.disabled = true;
                    return;
                }
                if (diffDays > 14) {
                    errorPeriodo.style.display = 'block';
                    errorText.innerHTML = `<strong>Entre mayo y septiembre el máximo es de 2 semanas (14 días)</strong><br>Días seleccionados: ${diffDays}`;
                    submitBtn.disabled = true;
                    return;
                }
            }

            calculationInfo.style.display = 'block';
            diasAlquilerSpan.textContent = diffDays;
            precioEstimadoSpan.textContent = precio;
            
            document.getElementById('amount').value = precio;
        }

        document.getElementById('startDate').addEventListener('change', function() {
            const startDate = this.value;
            document.getElementById('endDate').min = startDate;
            
            if (document.getElementById('endDate').value < startDate) {
                document.getElementById('endDate').value = startDate;
            }
            
            startDateSelected = true;
            
            if (endDateSelected) {
                validateTemporalRestrictions();
            }
        });

        document.getElementById('endDate').addEventListener('change', function() {
            endDateSelected = true;
            
            if (startDateSelected) {
                validateTemporalRestrictions();
            }
        });

        document.getElementById('numSeats').addEventListener('input', function() {
            if (startDateSelected && endDateSelected) {
                validateTemporalRestrictions();
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            const infoIcon = document.getElementById('infoIcon');
            const tooltipText = document.getElementById('tooltipText');

            infoIcon.addEventListener('click', function (e) {
                e.stopPropagation();
                tooltipText.style.display = tooltipText.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => tooltipText.style.display = 'none');
            tooltipText.addEventListener('click', e => e.stopPropagation());

            const startDateValue = document.getElementById('startDate').value;
            const endDateValue = document.getElementById('endDate').value;
            
            if (startDateValue && endDateValue) {
                startDateSelected = true;
                endDateSelected = true;
                validateTemporalRestrictions();
            }
        });

        document.getElementById('alquilerForm').addEventListener('submit', function(e) {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (startDate < today) {
                alert('❌ La fecha de inicio no puede ser anterior a hoy');
                e.preventDefault();
                return;
            }

            if (endDate < startDate) {
                alert('❌ La fecha de fin no puede ser anterior a la fecha de inicio');
                e.preventDefault();
                return;
            }

            if (submitBtn.disabled) {
                e.preventDefault();
                alert('❌ Por favor, corrija los errores en el formulario antes de enviar');
            }
        });
    </script>
</body>
</html>
