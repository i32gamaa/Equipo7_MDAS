<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Embarcaciones Fallida</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>

<body>
    <main class="overlay error">
        <h1>Búsqueda de Embarcaciones Fallida</h1>
        
        <p class="error-message">
            No se han encontrado embarcaciones disponibles para las fechas seleccionadas.
        </p>

        <nav class="btn-group">
            <a th:href="@{/findAlquilerByDate}" class="btn btn-primary">Intentar de nuevo</a>
            <a th:href="@{/listAlquileres}" class="btn btn-secondary">Ver todos los alquileres</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </nav>
    </main>
</body>
</html>
