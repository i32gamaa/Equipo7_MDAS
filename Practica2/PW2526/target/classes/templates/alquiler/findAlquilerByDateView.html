<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Embarcaciones Disponibles</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <div class="overlay">
        <h1>📅 Buscar Embarcaciones Disponibles</h1>
        <p>Encuentra embarcaciones disponibles para tus fechas</p>

        <form th:action="@{/findAlquilerByDate}" method="post" class="form-container" id="searchFleetForm">
            <div class="form-group">
                <label for="startDate">Fecha de Inicio:</label>
                <input type="date" id="startDate" name="startDate" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
            </div>
            
            <div class="form-group">
                <label for="endDate">Fecha de Fin:</label>
                <input type="date" id="endDate" name="endDate" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
            </div>
            
            <button type="submit" class="btn btn-primary">🔍 Buscar Disponibles</button>
        </form>

        <p class="note">Se mostrarán las embarcaciones que NO están alquiladas entre las fechas seleccionadas.</p>

        <nav class="btn-group">
            <a th:href="@{/addAlquiler}" class="btn btn-outline-light">Nuevo Alquiler</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </nav>
    </div>

    <script>
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const searchFleetForm = document.getElementById('searchFleetForm');

        document.addEventListener('DOMContentLoaded', initializeSearchPage);

        function initializeSearchPage() {
            setupInitialDateBounds();
            setupEventListeners();
        }

        function setupInitialDateBounds() {
            const currentIsoDate = new Date().toISOString().split('T')[0];
            startDateInput.min = currentIsoDate;
            endDateInput.min = currentIsoDate;
        }

        function setupEventListeners() {
            startDateInput.addEventListener('change', handleStartDateChange);
            searchFleetForm.addEventListener('submit', handleFormSubmission);
        }

        function handleStartDateChange() {
            const selectedStartDate = startDateInput.value;
            endDateInput.min = selectedStartDate;
            
            if (endDateInput.value < selectedStartDate) {
                endDateInput.value = selectedStartDate;
            }
        }

        function handleFormSubmission(event) {
            const selectedStartDate = new Date(startDateInput.value);
            const selectedEndDate = new Date(endDateInput.value);
            const currentSystemDate = new Date();
            currentSystemDate.setHours(0, 0, 0, 0);

            if (selectedStartDate < currentSystemDate) {
                alert('❌ La fecha de inicio no puede ser anterior a hoy');
                event.preventDefault();
                return;
            }

            if (selectedEndDate < selectedStartDate) {
                alert('❌ La fecha de fin no puede ser anterior a la fecha de inicio');
                event.preventDefault();
                return;
            }
        }
    </script>
</body>
</html>
