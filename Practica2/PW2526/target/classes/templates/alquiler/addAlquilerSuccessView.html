<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket de Alquiler</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/ticket.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <script>
        document.addEventListener('DOMContentLoaded', initializeTicketPage);

        function initializeTicketPage() {
            renderCurrentTimestamp();
            processRentalDuration();
            triggerTicketPulseAnimation();
        }

        function renderCurrentTimestamp() {
            const currentDateTime = new Date();
            const formattedDate = currentDateTime.toLocaleDateString('es-ES');
            const formattedTime = currentDateTime.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('currentDate').textContent = `${formattedDate} ${formattedTime}`;
        }

        function processRentalDuration() {
            const startDateRawText = document.getElementById('startDateValue').textContent;
            const endDateRawText = document.getElementById('endDateValue').textContent;

            if (!startDateRawText || !endDateRawText) {
                updateDurationDisplay('Fechas no disponibles');
                return;
            }

            try {
                const rentalStartDate = parseIsoDateString(startDateRawText);
                const rentalEndDate = parseIsoDateString(endDateRawText);

                if (isValidDateObject(rentalStartDate) && isValidDateObject(rentalEndDate)) {
                    const totalRentalDays = calculateDaysBetweenDates(rentalStartDate, rentalEndDate);
                    updateDurationDisplay(`${totalRentalDays} días`);
                    updateRentalStatusDisplay(rentalStartDate, rentalEndDate);
                } else {
                    updateDurationDisplay('Error en fechas');
                }
            } catch (processingError) {
                console.error('Error calculando fechas:', processingError);
                updateDurationDisplay('Error en cálculo');
            }
        }

        function parseIsoDateString(dateString) {
            const dateComponents = dateString.split('-');
            const year = parseInt(dateComponents[0]);
            const monthIndex = parseInt(dateComponents[1]) - 1;
            const day = parseInt(dateComponents[2]);
            
            return new Date(year, monthIndex, day);
        }

        function isValidDateObject(dateObject) {
            return dateObject && !isNaN(dateObject.getTime());
        }

        function calculateDaysBetweenDates(startDate, endDate) {
            const durationMilliseconds = Math.abs(endDate - startDate);
            const millisecondsInDay = 1000 * 60 * 60 * 24;
            
            return Math.ceil(durationMilliseconds / millisecondsInDay);
        }

        function updateDurationDisplay(statusMessage) {
            document.getElementById('durationBadge').textContent = statusMessage;
            const daysTextElement = document.getElementById('daysText');
            if (daysTextElement) {
                daysTextElement.textContent = statusMessage;
            }
        }

        function updateRentalStatusDisplay(startDate, endDate) {
            const currentSystemDate = new Date();
            currentSystemDate.setHours(0, 0, 0, 0);
            
            const normalizedStartDate = new Date(startDate);
            normalizedStartDate.setHours(0, 0, 0, 0);
            
            const normalizedEndDate = new Date(endDate);
            normalizedEndDate.setHours(0, 0, 0, 0);

            const statusBadgeElement = document.getElementById('statusBadge');
            statusBadgeElement.className = 'status-badge';

            if (normalizedStartDate > currentSystemDate) {
                statusBadgeElement.textContent = 'Pendiente';
            } else if (normalizedEndDate >= currentSystemDate) {
                statusBadgeElement.textContent = 'En curso';
            } else {
                statusBadgeElement.textContent = 'Finalizado';
            }
        }

        function triggerTicketPulseAnimation() {
            setTimeout(() => {
                const ticketContainer = document.querySelector('.ticket');
                if (ticketContainer) {
                    ticketContainer.style.transform = 'scale(1.02)';
                    setTimeout(() => {
                        ticketContainer.style.transform = 'scale(1)';
                    }, 200);
                }
            }, 500);
        }
    </script>
</body>
</html>
