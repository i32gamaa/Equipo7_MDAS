<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Añadir Nueva Reserva</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="stylehome.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="overlay">
        <h5 class="white">Añadir Nueva Reserva</h5>

        <form th:action="@{/addReserva}" method="post" th:object="${newReserva}">
            <!-- ID del Socio -->
            <div class="form-group">
                <label for="userId">ID del Socio</label>
                <input type="text" id="userId" th:field="*{userId}" required>
            </div>

            <!-- Matrícula -->
            <div class="form-group">
                <label for="registrationNumber">Matrícula</label>
                <input type="text" id="registrationNumber" th:field="*{registrationNumber}" required>
            </div>

            <!-- Fecha -->
            <div class="form-group">
                <label for="date">Fecha</label>
                <input type="date" id="date" th:field="*{date}" required>
            </div>

            <!-- Número de Plazas con tooltip -->
            <div class="form-group position-relative">
                <label for="numSeats">
                    Número de Plazas
                    <span class="info-icon" id="infoIcon">?</span>
                </label>
                <input type="number" id="numSeats" th:field="*{numSeats}" min="1" max="30" required>
                <div class="tooltip-text" id="tooltipText">Precio por plaza = 40€</div>
            </div>

            <!-- Propósito -->
            <div class="form-group" style="grid-column: span 2;">
                <label for="purpose">Propósito</label>
                <input type="text" id="purpose" th:field="*{purpose}" required>
            </div>

            <!-- Botones -->
            <div class="d-flex justify-content-center gap-3 mt-3" style="grid-column: span 2;">
                <a th:href="@{/}" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-primary">Crear Reserva</button>
            </div>
        </form>
    </div>

    <script>
        // Fecha mínima = hoy
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);

        // Tooltip dinámico
        document.addEventListener('DOMContentLoaded', function () {
            const infoIcon = document.getElementById('infoIcon');
            const tooltipText = document.getElementById('tooltipText');

            infoIcon.addEventListener('click', function (e) {
                e.stopPropagation();
                tooltipText.style.display = tooltipText.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => tooltipText.style.display = 'none');
            tooltipText.addEventListener('click', e => e.stopPropagation());
        });
    </script>
</body>

</html>
