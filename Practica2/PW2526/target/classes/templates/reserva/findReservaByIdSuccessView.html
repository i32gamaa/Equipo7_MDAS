<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Encontrada</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/success.css}">
</head>

<body>
    <main class="overlay">
        <h1>Reserva Encontrada</h1>
        <p class="subtitle" th:text="${message}">Reserva localizada correctamente.</p>

        <section th:if="${reserva != null}" class="details">
            <h3>Información de la Reserva</h3>
            <table class="styled-table">
                <tbody>
                    <tr>
                        <th>ID de Reserva</th>
                        <td th:text="${reserva.id}"></td>
                    </tr>
                    <tr>
                        <th>Fecha</th>
                        <td th:text="${reserva.date}"></td>
                    </tr>
                    <tr>
                        <th>ID del Cliente</th>
                        <td th:text="${reserva.userId}"></td>
                    </tr>
                    <tr>
                        <th>Matrícula del Vehículo</th>
                        <td th:text="${reserva.registrationNumber}"></td>
                    </tr>
                    <tr>
                        <th>Número de Plazas</th>
                        <td th:text="${reserva.numSeats}"></td>
                    </tr>
                    <tr>
                        <th>Tarifa</th>
                        <td th:text="${reserva.totalAmount} + ' €'"></td>
                    </tr>
                    <tr th:if="${reserva.purpose != null and not #strings.isEmpty(reserva.purpose)}">
                        <th>Propósito</th>
                        <td th:text="${reserva.purpose}"></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <nav class="btn-group">
            <a th:href="@{/findReservaById}" class="btn btn-primary">Nueva Búsqueda</a>
            <a th:href="@{/listReservas}" class="btn btn-outline-light">Ver Todas</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </nav>
    </main>
</body>
</html>
