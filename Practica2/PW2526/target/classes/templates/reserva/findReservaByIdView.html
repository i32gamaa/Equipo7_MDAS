<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Alquiler por ID</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>Buscar Reserva por ID</h1>

        <form th:action="@{/findReservaById}" method="post">
            <div class="form-group">
                <label for="id">ID de la reserva:</label>
                <input type="number" id="id" name="id" th:value="${param.id}" placeholder="Introduce el ID" required>
            </div>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <nav class="btn-group">
            <a th:href="@{/listReservas}" class="btn btn-outline-light">Ver Todas las Reservas</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </nav>
    </main>
</body>
</html>
