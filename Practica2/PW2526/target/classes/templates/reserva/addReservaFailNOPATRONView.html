<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Error al crear reserva</title>
    <link rel="stylesheet" href="stylefail.css">
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>

        <h2 class="titulo-error-w">Error al crear reserva</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span>EMBARCACIÓN SIN PATRÓN ASIGNADO</span>
        </div>

        <div class="detail-section">
            <div class="detail-label">EMBARCACIÓN SOLICITADA:</div>
            <div class="detail-value" th:text="${reserva.registrationNumber}">REG002</div>
        </div>

        <p>Verifique que la embarcación disponga de patrón.</p>

        <div class="action-buttons">
            <a href="/findEmbarcacionByRegistration" class="btn btn-primary">
                <i class="fas fa-redo-alt"></i>
                Buscar Embarcación por Matricula
            </a>
            <a href="/addReserva" class="btn btn-primary">
                <i class="fas fa-redo-alt"></i>
                Realizar otra reserva
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                Volver al inicio
            </a>
        </div>
    </div>
</body>

</html>
