<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error al crear reserva</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>

<body>
    <main class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
        </div>

        <h2 class="error-title">Error al crear reserva</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
            <span>Embarcación sin patrón asignado</span>
        </div>

        <section class="detail-section">
            <div class="detail-label">Embarcación solicitada:</div>
            <div class="detail-value" th:text="${bookingItem != null ? bookingItem.registrationNumber : 'N/D'}">REG002</div>
        </section>

        <p class="error-instruction">Verifique que la embarcación disponga de un patrón asignado antes de proceder con la reserva.</p>

        <nav class="action-buttons">
            <a th:href="@{/findEmbarcacionByRegistration}" class="btn btn-primary">
                <i class="fas fa-search" aria-hidden="true"></i> Buscar Embarcación por Matrícula
            </a>
            <a th:href="@{/addReserva}" class="btn btn-primary">
                <i class="fas fa-redo-alt" aria-hidden="true"></i> Realizar otra reserva
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="fas fa-home" aria-hidden="true"></i> Volver al inicio
            </a>
        </nav>
    </main>
</body>
</html>
