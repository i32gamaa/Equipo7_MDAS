<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No se encontraron embarcaciones</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>

<body>
    <main class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
        </div>

        <h2 class="error-title">No se encontraron embarcaciones</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
            <span>No hay embarcaciones del tipo solicitado</span>
        </div>

        <section class="detail-section">
            <div class="detail-label">Tipo buscado:</div>
            <div class="detail-value" th:text="${boatType}">Tipo</div>
        </section>

        <p class="error-instruction">No hay embarcaciones registradas del tipo seleccionado.</p>

        <nav class="action-buttons">
            <a th:href="@{/findEmbarcacionByType}" class="btn btn-primary">
                <i class="fas fa-redo-alt" aria-hidden="true"></i> Intentar de nuevo
            </a>
            <a th:href="@{/findEmbarcacionMenu}" class="btn btn-outline-light">
                <i class="fas fa-search" aria-hidden="true"></i> Volver al Menú de Búsqueda
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="fas fa-home" aria-hidden="true"></i> Volver al inicio
            </a>
        </nav>
    </main>
</body>
</html>
