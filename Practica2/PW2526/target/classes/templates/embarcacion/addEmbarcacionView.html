<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Embarcación</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>Añadir Nueva Embarcación</h1>

        <form th:action="@{/addEmbarcacion}" th:object="${boatForm}" method="post">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="registrationNumber">Número de Registro</label>
                    <input type="text" id="registrationNumber" th:field="*{registrationNumber}" required>
                </div>
                
                <div class="form-group">
                    <label for="type">Tipo</label>
                    <select id="type" th:field="*{type}" required>
                        <option th:each="typeItem : ${boatTypes}" th:value="${typeItem}" th:text="${typeItem}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label for="name">Nombre</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="numSeats">Número de Asientos</label>
                    <input type="number" id="numSeats" th:field="*{numSeats}" min="1" required>
                </div>
                
                <div class="form-group">
                    <label for="length">Eslora (m)</label>
                    <input type="number" step="0.01" id="length" th:field="*{length}" min="0" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="width">Manga (m)</label>
                    <input type="number" step="0.01" id="width" th:field="*{width}" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="height">Puntal (m)</label>
                    <input type="number" step="0.01" id="height" th:field="*{height}" min="0" required>
                </div>
            </div>

            <nav class="form-buttons" style="grid-column: span 2;">
                <button type="submit" class="btn btn-primary">Guardar Embarcación</button>
                <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
            </nav>
        </form>
    </main>
</body>
</html>
