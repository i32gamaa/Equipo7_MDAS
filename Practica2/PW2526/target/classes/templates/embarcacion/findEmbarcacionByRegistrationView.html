<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar embarcación por matrícula</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>Buscar Embarcación por Matrícula</h1>

        <form th:action="@{/findEmbarcacionByRegistration}" method="post">
            <div class="form-group">
                <label for="registrationNumber">Matrícula:</label>
                <input type="text" id="registrationNumber" name="registrationNumber" placeholder="Introduce la matrícula" required>
            </div>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <nav class="btn-group">
            <a th:href="@{/findEmbarcacionMenu}" class="btn btn-secondary">Volver al Menú de Búsqueda</a>
            <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
        </nav>
    </main>
</body>
</html>
