<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarcación Añadida</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/success.css}">
</head>

<body>
    <main class="overlay">
        <h1>Embarcación Añadida Correctamente</h1>
        <p class="subtitle">La embarcación ha sido registrada en el sistema</p>

        <section class="details">
            <h3>Información de la Embarcación</h3>
            <table class="styled-table">
                <tbody>
                    <tr>
                        <th>Matrícula</th>
                        <td th:text="${boatItem.registrationNumber}"></td>
                    </tr>
                    <tr>
                        <th>Tipo</th>
                        <td th:text="${boatItem.type}"></td>
                    </tr>
                    <tr>
                        <th>Nombre</th>
                        <td th:text="${boatItem.name}"></td>
                    </tr>
                    <tr>
                        <th>Plazas</th>
                        <td th:text="${boatItem.numSeats}"></td>
                    </tr>
                    <tr>
                        <th>Longitud</th>
                        <td th:text="${boatItem.length} + ' m'"></td>
                    </tr>
                    <tr>
                        <th>Ancho</th>
                        <td th:text="${boatItem.width} + ' m'"></td>
                    </tr>
                    <tr>
                        <th>Altura</th>
                        <td th:text="${boatItem.height} + ' m'"></td>
                    </tr>
                    <tr>
                        <th>Patrón Asignado</th>
                        <td>
                            <span th:if="${boatItem.patronId != null}" th:text="${boatItem.patronId}" class="badge-success">Asignado</span>
                            <span th:unless="${boatItem.patronId != null}" class="badge-secondary">Sin asignar</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

        <nav class="btn-group">
            <a th:href="@{/addEmbarcacion}" class="btn btn-primary">Añadir Otra Embarcación</a>
            <a th:href="@{/listEmbarcacion}" class="btn btn-outline-light">Ver Todas las Embarcaciones</a>
            <a th:href="@{/}" class="btn btn-outline-light">Volver al Inicio</a>
        </nav>
    </main>
</body>
</html>
