<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <title>Embarcación Añadida</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="stylesuccess.css">
</head>

<body>
    <main class="overlay">
        <h1>Embarcación Añadida Correctamente</h1>
        <p class="subtitle">La embarcación ha sido registrada en el sistema</p>

        <section class="details">
            <h3>Información de la Embarcación</h3>
            <table class="styled-table">
                <tr><th>Matrícula</th><td th:text="${embarcacion.registrationNumber}"></td></tr>
                <tr><th>Tipo</th><td th:text="${embarcacion.type}"></td></tr>
                <tr><th>Nombre</th><td th:text="${embarcacion.name}"></td></tr>
                <tr><th>Plazas</th><td th:text="${embarcacion.numSeats}"></td></tr>
                <tr><th>Longitud</th><td th:text="${embarcacion.length} + ' m'"></td></tr>
                <tr><th>Ancho</th><td th:text="${embarcacion.width} + ' m'"></td></tr>
                <tr><th>Altura</th><td th:text="${embarcacion.height} + ' m'"></td></tr>
                <tr><th>Patrón Asignado</th>
                    <td>
                        <span th:if="${embarcacion.patronId != null}" th:text="${embarcacion.patronId}" class="badge-success">Asignado</span>
                        <span th:unless="${embarcacion.patronId != null}" class="badge-secondary">Sin asignar</span>
                    </td>
                </tr>
            </table>
        </section>

        <div class="btn-group">
            <a th:href="@{/addEmbarcacion}" class="btn btn-primary">Añadir Otra Embarcación</a>
            <a th:href="@{/listEmbarcacion}" class="btn btn-outline-light">Ver Todas las Embarcaciones</a>
            <a th:href="@{/}" class="btn btn-outline-light">Volver al Inicio</a>
        </div>
    </main>
</body>
</html>
