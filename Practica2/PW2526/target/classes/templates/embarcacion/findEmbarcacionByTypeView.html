<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar embarcación por tipo</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>Buscar Embarcación por Tipo</h1>

        <form th:action="@{/findEmbarcacionByType}" method="post">
            <div class="form-group">
                <label for="type">Tipo de embarcación:</label>
                <select id="type" name="boatType" required>
                    <option th:each="typeItem : ${boatTypes}" th:value="${typeItem}" th:text="${typeItem}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <nav class="btn-group">
            <a th:href="@{/findEmbarcacionMenu}" class="btn btn-secondary">Volver al Menú de Búsqueda</a>
            <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
        </nav>
    </main>
</body>
</html>
