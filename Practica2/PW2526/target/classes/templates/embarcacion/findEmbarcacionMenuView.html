<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Embarcación</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>Buscar Embarcación</h1>
        <p>Selecciona el tipo de búsqueda:</p>

        <div class="action-grid">
            <section class="action-card">
                <i class="fas fa-search" aria-hidden="true"></i>
                <h5>Por Matrícula</h5>
                <p class="card-description">Busca una embarcación específica por su número de registro</p>
                <a th:href="@{/findEmbarcacionByRegistration}" class="btn btn-primary">Buscar</a>
            </section>
            
            <section class="action-card">
                <i class="fas fa-list" aria-hidden="true"></i>
                <h5>Por Tipo</h5>
                <p class="card-description">Encuentra todas las embarcaciones de un tipo específico</p>
                <a th:href="@{/findEmbarcacionByType}" class="btn btn-primary">Buscar</a>
            </section>
        </div>

        <nav class="btn-group">
            <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
        </nav>
    </main>
</body>
</html>
