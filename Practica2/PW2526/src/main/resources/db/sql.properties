# ===== SOCIO =====
socio.findAll=SELECT id, name, surname, address, birthdate, inscriptionDate, isHolderInscription, isBoatDriver, isAdult, inscriptionId FROM Socio
socio.findById=SELECT id, name, surname, address, birthdate, inscriptionDate, isHolderInscription, isBoatDriver, isAdult, inscriptionId FROM Socio WHERE id = ?
socio.insert1=INSERT INTO Socio (id, name, surname, address, birthdate, inscriptionDate, isHolderInscription, isBoatDriver, isAdult) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
socio.insert2=INSERT INTO Socio (id, name, surname, address, birthdate, inscriptionDate, isHolderInscription, isBoatDriver, isAdult, inscriptionId) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
socio.update=UPDATE Socio SET inscriptionId=? WHERE id=?
socio.assignInscription= SELECT i.id FROM Inscripcion i WHERE i.userId = ?
socio.existsById=SELECT COUNT(*) FROM socio WHERE id = ?
socio.updateIsBoatDriver= UPDATE Socio SET isBoatDriver = ? WHERE id = ?
socio.deleteIsNotHolder= DELETE FROM Socio WHERE id=?
socio.updateSocio= UPDATE Socio SET name = ?, surname = ?, address = ?, birthdate = ? WHERE id = ?
socio.updateTodo= UPDATE Socio SET name = ?, surname = ?, address = ?, birthdate = ?, inscriptionDate = ?, isHolderInscription = ?, isBoatDriver = ?, isAdult = ?, inscriptionId = ? WHERE id = ?

# ===== INSCRIPCION =====
inscripcion.findAll=SELECT id, date, totalAmount, userId, registeredAdults, registeredKids FROM Inscripcion
inscripcion.findById=SELECT id, date, totalAmount, userId, registeredAdults, registeredKids FROM Inscripcion WHERE id = ?
inscripcion.insert=INSERT INTO Inscripcion (date, totalAmount, userId, registeredAdults, registeredKids) VALUES (?, ?, ?, ?, ?)
inscripcion.update=UPDATE Inscripcion SET totalAmount=?, registeredAdults=?, registeredKids=? WHERE id=?
inscripcion.delete=DELETE FROM Inscripcion WHERE id=?
inscripcion.findByUserId=SELECT id, userId, date, totalAmount, registeredAdults, registeredKids FROM Inscripcion WHERE userId = ?
inscripcion.findIndividual= SELECT id, userId, date, totalAmount, registeredAdults, registeredKids FROM Inscripcion WHERE totalAmount = 300
inscripcion.findFamiliar= SELECT id, userId, date, totalAmount, registeredAdults, registeredKids FROM Inscripcion WHERE totalAmount <> 300

# ===== RESERVA =====
reserva.findAll=SELECT * FROM Reserva
reserva.findById=SELECT * FROM Reserva WHERE id = ?
reserva.findByThisDate = SELECT * FROM Reserva WHERE date = ?
reserva.insert=INSERT INTO Reserva (userId, registrationNumber, date, numSeats, purpose, totalAmount) VALUES (?, ?, ?, ?, ?, ?)
reserva.update=UPDATE Reserva SET purpose=?, date=?, numSeats=?, userId=?, registrationNumber=?, totalAmount=? WHERE id=?
reserva.patronAssigned=SELECT p.id FROM Patron p JOIN Embarcacion e ON p.id = e.patronId WHERE e.registrationNumber = ?
reserva.hasCapacity=SELECT e.numSeats FROM Embarcacion e WHERE e.registrationNumber = ?
reserva.isAvailable=SELECT COUNT(*) FROM Reserva r WHERE r.registrationNumber = ? AND r.date = ?
reserva.isAvailableInAlquiler=SELECT COUNT(*) FROM Alquiler a WHERE a.registrationNumber = ? AND (? BETWEEN a.startDate AND a.endDate)
reserva.isAdult=SELECT s.isAdult FROM Socio s WHERE s.id = ?
reserva.delete=DELETE FROM Reserva WHERE id=?
reserva.findByAfterDate=SELECT * FROM Reserva r WHERE r.date >= ?

# ===== EMBARCACION =====
embarcacion.findAll=SELECT registrationNumber, type, name, numSeats, patronId, length, width, height FROM Embarcacion
embarcacion.findByRegistration=SELECT registrationNumber, type, name, numSeats, patronId, length, width, height FROM Embarcacion WHERE registrationNumber = ?
embarcacion.findByName=SELECT registrationNumber, type, name, numSeats, patronId, length, width, height FROM Embarcacion WHERE name = ?
embarcacion.insert=INSERT INTO Embarcacion (registrationNumber, type, name, numSeats, patronId, length, width, height) VALUES (?, ?, ?, ?, ?, ?, ?, ?)
embarcacion.update=UPDATE Embarcacion SET type=?, name=?, numSeats=?, patronId=?, length=?, width=?, height=? WHERE registrationNumber=?
embarcacion.delete=DELETE FROM Embarcacion WHERE registrationNumber=?
embarcacion.findByType=SELECT registrationNumber, type, name, numSeats, patronId, length, width, height FROM Embarcacion WHERE type = ?
embarcacion.findAvailableByDate=SELECT e.registrationNumber, e.type, e.name, e.numSeats, e.patronId, e.length, e.width, e.height FROM Embarcacion e WHERE e.registrationNumber NOT IN (SELECT a.registrationNumber FROM Alquiler a WHERE ? BETWEEN a.startDate AND a.endDate) AND e.registrationNumber NOT IN (SELECT r.registrationNumber FROM Reserva r WHERE r.date = ?)
embarcacion.findAvailableByDateRange=SELECT e.registrationNumber, e.type, e.name, e.numSeats, e.patronId, e.length, e.width, e.height FROM Embarcacion e WHERE e.registrationNumber NOT IN (SELECT a.registrationNumber FROM Alquiler a WHERE (a.startDate BETWEEN ? AND ?) OR (a.endDate BETWEEN ? AND ?) OR (? BETWEEN a.startDate AND a.endDate) OR (? BETWEEN a.startDate AND a.endDate))
embarcacion.countAlquileres=SELECT COUNT(*) FROM Alquiler WHERE registrationNumber=?

# ===== PATRON =====
patron.findAll=SELECT id, name, surname, birthDate, titleIssueDate FROM Patron
patron.findById=SELECT id, name, surname, birthDate, titleIssueDate FROM Patron WHERE id = ?
patron.insert=INSERT INTO Patron (id, name, surname, birthDate, titleIssueDate) VALUES (?, ?, ?, ?, ?)
patron.update=UPDATE Patron SET name=?, surname=?, birthDate=?, titleIssueDate=? WHERE id=?
patron.delete=DELETE FROM Patron WHERE id=?
patron.countEmbarcaciones=SELECT COUNT(*) FROM Embarcacion WHERE patronId=?

# ===== ALQUILER =====
alquiler.findAll=SELECT id, userId, startDate, endDate, registrationNumber, numSeats, totalAmount FROM Alquiler WHERE endDate >= CURDATE() ORDER BY startDate ASC
alquiler.findCurrentAndFuture=SELECT id, userId, startDate, endDate, registrationNumber, numSeats, totalAmount FROM Alquiler WHERE endDate >= CURDATE() ORDER BY startDate ASC
alquiler.findById=SELECT id, userId, startDate, endDate, registrationNumber, numSeats, totalAmount FROM Alquiler WHERE id = ?
alquiler.existsById=SELECT COUNT(*) FROM Alquiler WHERE id = ?
alquiler.insert=INSERT INTO Alquiler (userId, startDate, endDate, registrationNumber, numSeats, totalAmount) VALUES (?, ?, ?, ?, ?, ?)
alquiler.update=UPDATE Alquiler SET userId=?, startDate=?, endDate=?, registrationNumber=?, numSeats=?, totalAmount=? WHERE id=?
alquiler.delete=DELETE FROM Alquiler WHERE id=?
alquiler.findByDate=SELECT id, userId, startDate, endDate, registrationNumber, numSeats, totalAmount FROM Alquiler WHERE ? BETWEEN startDate AND endDate ORDER BY startDate ASC
