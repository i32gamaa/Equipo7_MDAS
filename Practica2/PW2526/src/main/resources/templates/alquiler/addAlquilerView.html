<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquilar Embarcación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    
    <style>
        .error-periodo {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            display: none;
        }
        .error-periodo h5 {
            color: #ff6b6b;
            margin-bottom: 8px;
            font-family: 'italianaregular';
        }
        .error-periodo p {
            margin: 5px 0;
            color: #ff8e8e;
        }
        .error-periodo small {
            color: #ffabab;
            font-style: italic;
        }
        
        .calculation-info {
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            display: none;
        }
        .calculation-info h5 {
            color: #00bfff;
            margin-bottom: 8px;
            font-family: 'italianaregular';
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h5 class="white">Alquilar Embarcación</h5>

        <form th:action="@{/addAlquiler}" method="post" th:object="${alquilerForm}" id="alquilerForm">
            
            <div class="form-group">
                <label for="registrationNumber">Matrícula</label>
                <input type="text" id="registrationNumber" th:field="*{registrationNumber}" 
                       th:readonly="${embarcacion != null}" required>
            </div>

            <div class="form-group">
                <label for="userId">ID del Socio</label>
                <input type="text" id="userId" th:field="*{userId}" required>
            </div>

            <div class="form-group">
                <label for="startDate">Fecha de Inicio</label>
                <input type="date" id="startDate" th:field="*{startDate}" 
                       th:value="${alquilerForm.startDate != null} ? ${#temporals.format(alquilerForm.startDate, 'yyyy-MM-dd')} : ${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
            </div>

            <div class="form-group">
                <label for="endDate">Fecha de Fin</label>
                <input type="date" id="endDate" th:field="*{endDate}" 
                       th:value="${alquilerForm.endDate != null} ? ${#temporals.format(alquilerForm.endDate, 'yyyy-MM-dd')} : ''" required>
            </div>

            <div class="form-group position-relative">
                <label for="numSeats">
                    Número de Plazas
                    <span class="info-icon" id="infoIcon">?</span>
                </label>
                <input type="number" id="numSeats" th:field="*{numSeats}" min="1" max="20" required>
                <div class="tooltip-text" id="tooltipText">Precio por plaza por día = 20€</div>
            </div>

            <input type="hidden" id="amount" name="amount" th:field="*{amount}">

            <div id="errorPeriodo" class="error-periodo" style="grid-column: span 2;">
                <h5>❌ Periodo No Permitido</h5>
                <p id="errorText"></p>
                <small>Por favor, ajuste las fechas</small>
            </div>

            <div id="calculationInfo" class="calculation-info" style="grid-column: span 2;">
                <h5>✅ Período Válido</h5>
                <p><strong>Días de alquiler:</strong> <span id="diasAlquiler">0</span> días</p>
                <p><strong>Precio estimado:</strong> <span id="precioEstimado">0</span>€</p>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-3" style="grid-column: span 2;">
                <a th:href="@{/}" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-primary" id="submitBtn">Crear Alquiler</button>
            </div>
        </form>
    </div>

    <script>
        const PRICE_PER_SEAT_DAY = 20;
        const MILLISECONDS_IN_DAY = 1000 * 60 * 60 * 24;

        const errorPeriodoContainer = document.getElementById('errorPeriodo');
        const errorTextDisplay = document.getElementById('errorText');
        const calculationInfoContainer = document.getElementById('calculationInfo');
        const totalRentalDaysSpan = document.getElementById('diasAlquiler');
        const estimatedPriceSpan = document.getElementById('precioEstimado');
        const submitButton = document.getElementById('submitBtn');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const numSeatsInput = document.getElementById('numSeats');

        let isStartDateSelected = false;
        let isEndDateSelected = false;

        document.addEventListener('DOMContentLoaded', initializeRentalForm);

        function initializeRentalForm() {
            setupInitialDateBounds();
            setupEventListeners();
            checkPreloadedFormValues();
        }

        function setupInitialDateBounds() {
            const currentIsoDate = new Date().toISOString().split('T')[0];
            startDateInput.setAttribute('min', currentIsoDate);
            endDateInput.setAttribute('min', currentIsoDate);
        }

        function setupEventListeners() {
            startDateInput.addEventListener('change', handleStartDateChange);
            endDateInput.addEventListener('change', handleEndDateChange);
            numSeatsInput.addEventListener('input', handleSeatInput);
            
            setupTooltipToggle();
            document.getElementById('alquilerForm').addEventListener('submit', handleFormSubmission);
        }

        function checkPreloadedFormValues() {
            if (startDateInput.value && endDateInput.value) {
                isStartDateSelected = true;
                isEndDateSelected = true;
                validateRentalConstraints();
            }
        }

        function handleStartDateChange() {
            const selectedStartDate = startDateInput.value;
            endDateInput.min = selectedStartDate;
            
            if (endDateInput.value < selectedStartDate) {
                endDateInput.value = selectedStartDate;
            }
            
            isStartDateSelected = true;
            triggerValidationIfDatesReady();
        }

        function handleEndDateChange() {
            isEndDateSelected = true;
            triggerValidationIfDatesReady();
        }

        function handleSeatInput() {
            triggerValidationIfDatesReady();
        }

        function triggerValidationIfDatesReady() {
            if (isStartDateSelected && isEndDateSelected) {
                validateRentalConstraints();
            }
        }

        function validateRentalConstraints() {
            const startDate = new Date(startDateInput.value);
            const endDate = new Date(endDateInput.value);
            const seatsCount = parseInt(numSeatsInput.value) || 0;

            resetValidationUI();

            if (isInvalidDate(startDate) || isInvalidDate(endDate)) {
                return;
            }

            const rentalDays = calculateTotalRentalDays(startDate, endDate);
            const startMonth = startDate.getMonth() + 1;
            const calculatedTotalPrice = rentalDays * seatsCount * PRICE_PER_SEAT_DAY;

            if (hasOffSeasonViolation(startMonth, rentalDays)) {
                displayErrorAlert(`<strong>Entre octubre y abril el máximo es de 3 días</strong><br>Días seleccionados: ${rentalDays}`);
                return;
            }
            
            if (hasHighSeasonShortViolation(startMonth, rentalDays)) {
                displayErrorAlert(`<strong>Entre mayo y septiembre el mínimo es de 1 semana (7 días)</strong><br>Días seleccionados: ${rentalDays}`);
                return;
            }

            if (hasHighSeasonLongViolation(startMonth, rentalDays)) {
                displayErrorAlert(`<strong>Entre mayo y septiembre el máximo es de 2 semanas (14 días)</strong><br>Días seleccionados: ${rentalDays}`);
                return;
            }

            displaySuccessMetrics(rentalDays, calculatedTotalPrice);
        }

        function resetValidationUI() {
            errorPeriodoContainer.style.display = 'none';
            calculationInfoContainer.style.display = 'none';
            submitButton.disabled = false;
        }

        function isInvalidDate(dateObject) {
            return !dateObject || isNaN(dateObject.getTime());
        }

        function calculateTotalRentalDays(startDate, endDate) {
            const absoluteDifferenceTime = Math.abs(endDate - startDate);
            return Math.ceil(absoluteDifferenceTime / MILLISECONDS_IN_DAY) + 1;
        }

        function hasOffSeasonViolation(startMonth, rentalDays) {
            const isOffSeason = (startMonth >= 10 || startMonth <= 4);
            return isOffSeason && rentalDays > 3;
        }

        function hasHighSeasonShortViolation(startMonth, rentalDays) {
            const isHighSeason = (startMonth >= 5 && startMonth <= 9);
            return isHighSeason && rentalDays < 7;
        }

        function hasHighSeasonLongViolation(startMonth, rentalDays) {
            const isHighSeason = (startMonth >= 5 && startMonth <= 9);
            return isHighSeason && rentalDays > 14;
        }

        function displayErrorAlert(messageHtml) {
            errorPeriodoContainer.style.display = 'block';
            errorTextDisplay.innerHTML = messageHtml;
            submitButton.disabled = true;
        }

        function displaySuccessMetrics(days, price) {
            calculationInfoContainer.style.display = 'block';
            totalRentalDaysSpan.textContent = days;
            estimatedPriceSpan.textContent = price;
            document.getElementById('amount').value = price;
        }

        function setupTooltipToggle() {
            const infoIcon = document.getElementById('infoIcon');
            const tooltipText = document.getElementById('tooltipText');

            infoIcon.addEventListener('click', function (event) {
                event.stopPropagation();
                tooltipText.style.display = tooltipText.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => tooltipText.style.display = 'none');
            tooltipText.addEventListener('click', event => event.stopPropagation());
        }

        function handleFormSubmission(event) {
            const startDate = new Date(startDateInput.value);
            const endDate = new Date(endDateInput.value);
            const normalizedToday = new Date();
            normalizedToday.setHours(0, 0, 0, 0);

            if (startDate < normalizedToday) {
                alert('❌ La fecha de inicio no puede ser anterior a hoy');
                event.preventDefault();
                return;
            }

            if (endDate < startDate) {
                alert('❌ La fecha de fin no puede ser anterior a la fecha de inicio');
                event.preventDefault();
                return;
            }

            if (submitButton.disabled) {
                event.preventDefault();
                alert('❌ Por favor, corrija los errores en el formulario antes de enviar');
            }
        }
    </script>
</body>
</html>
