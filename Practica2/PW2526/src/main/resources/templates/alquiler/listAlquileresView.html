<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Alquileres</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>
    <main class="overlay">
        <h1>📋 Listado de Alquileres</h1>
        <p>Gestiona y visualiza todos los alquileres del sistema</p>

        <section th:if="${rentalList != null and not rentalList.empty}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ID Socio</th>
                        <th>Matrícula</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Plazas</th>
                        <th>Importe (€)</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rentalItem : ${rentalList}">
                        <td th:text="${rentalItem.rentalId}"></td>
                        <td th:text="${rentalItem.userId}"></td>
                        <td th:text="${rentalItem.registrationNumber}"></td>
                        <td th:text="${rentalItem.startDate}"></td>
                        <td th:text="${rentalItem.endDate}"></td>
                        <td th:text="${rentalItem.numSeats}"></td>
                        <td th:text="${rentalItem.amount}"></td>
                        <td>
                            <span th:if="${rentalItem.endDate != null and rentalItem.endDate.isBefore(T(java.time.LocalDate).now())}" 
                                  class="status-completed">Completado</span>
                            <span th:unless="${rentalItem.endDate != null and rentalItem.endDate.isBefore(T(java.time.LocalDate).now())}" 
                                  class="status-active">Activo</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section> 
        
        <section th:if="${rentalList == null || rentalList.empty}" class="no-data">
            <h3>No hay alquileres registrados</h3>
            <p>No se encontraron alquileres en el sistema.</p>
        </section>

        <nav class="btn-group">
            <a th:href="@{/addAlquiler}" class="btn btn-primary">Nuevo Alquiler</a>
            <a th:href="@{/findAlquilerByDate}" class="btn btn-outline-light">Buscar Disponibles</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </nav>
    </main>
</body>
</html>
