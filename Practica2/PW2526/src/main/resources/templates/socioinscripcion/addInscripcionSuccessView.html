<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Creada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesuccess.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>
<body>
    <main class="overlay">
        <h1>Inscripción Creada Correctamente</h1>
        <p class="subtitle">Los datos de inscripción y socio se han guardado exitosamente en la base de datos.</p>

        <section class="details">
            <h3>Datos del Socio</h3>
            <table class="styled-table">
                <tr><th>DNI</th><td th:text="${socio.id}"></td></tr>
                <tr><th>Nombre</th><td th:text="${socio.name}"></td></tr>
                <tr><th>Apellidos</th><td th:text="${socio.surname}"></td></tr>
                <tr><th>Dirección</th><td th:text="${socio.address}"></td></tr>
                <tr><th>Fecha de nacimiento</th><td th:text="${socio.birthdate}"></td></tr>
                <tr><th>Patrón de embarcación</th><td th:text="${socio.isBoatDriver} ? 'Sí' : 'No'"></td></tr>
            </table>
        </section>

        <section class="details">
            <h3>Datos de la Inscripción</h3>
            <table class="styled-table">
                <tr><th>ID</th><td th:text="${inscripcion.id}"></td></tr>
                <tr><th>Fecha</th><td th:text="${inscripcion.date}"></td></tr>
                <tr><th>Cuota</th><td th:text="${inscripcion.totalAmount}"></td></tr>
            </table>
        </section>

        <div class="btn-group">
            <a th:href="@{/addInscripcion}" class="btn btn-primary">Añadir Nueva Inscripción</a>
            <a th:href="@{/listInscripciones}" class="btn btn-outline-light">Ver Todas</a>
            <a th:href="@{/}" class="btn btn-outline-light">Inicio</a>
        </div>
    </main>
</body>
</html>
