<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Buscar Patrón por DNI</title>
    <link rel="stylesheet" href="stylehome.css">
</head>

<body>
    <main class="overlay">
        <h1>Buscar Patrón por DNI</h1>

        <form th:action="@{/findPatronById}" method="post">
            <div class="form-group">
                <label class="form-label" for="idNumber">DNI del Patrón:</label>
                <input type="text" id="idNumber" name="idNumber" placeholder="Ej: 12345678A" required maxlength="9">
            </div>
            <button type="submit" class="btn btn-primary">Buscar Patrón</button>
        </form>

        <div class="btn-group">
            <a th:href="@{/listPatrones}" class="btn btn-outline-light">Ver Todos los Patrones</a>
            <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </main>
</body>
</html>
