<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylehome.css">
    <title>Añadir Nuevo Patrón</title>
    <link rel="icon" href="images/logo.png" type="image/png">
</head>

<body>
    <div class="overlay">
        <h5 class="white">Añadir Nuevo Patrón</h5>

        <form th:action="@{/addPatron}" method="post" th:object="${newPatron}">
            <!-- DNI -->
            <div class="form-group">
                <label for="id">DNI:</label>
                <input type="text" id="id" th:field="*{id}" required maxlength="9" placeholder="12345678A">
            </div>

            <!-- Nombre -->
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <!-- Apellidos -->
            <div class="form-group">
                <label for="surname">Apellidos:</label>
                <input type="text" id="surname" th:field="*{surname}" required>
            </div>

            <!-- Fecha de Nacimiento -->
            <div class="form-group">
                <label for="birthDate">Fecha de Nacimiento:</label>
                <input type="date" id="birthDate" th:field="*{birthDate}" required>
            </div>

            <!-- Fecha de Expedición del Título (SIN LÍMITE) -->
            <div class="form-group">
                <label for="titleIssueDate">Fecha de Expedición del Título:</label>
                <input type="date" id="titleIssueDate" th:field="*{titleIssueDate}" required>
            </div>

            <!-- Botones -->
            <div class="d-flex justify-content-center gap-3 mt-3" style="grid-column: span 2;">
                <a th:href="@{/}" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-primary">Añadir Patrón</button>
            </div>
        </form>
    </div>

    <script>
        // Solo establecer límite para la fecha de nacimiento (máximo hoy)
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('birthDate').setAttribute('max', today);
        
        // La fecha de expedición del título NO tiene límite
    </script>
</body>
</html>
