<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Embarcaciones Encontradas</title>
    <link rel="stylesheet" href="stylesuccess.css">
</head>

<body>
    <main class="overlay">
        <h1>Embarcaciones Encontradas</h1>
        <p class="subtitle" th:text="'Tipo: ' + ${type}">Tipo: VELERO</p>

        <section th:if="${embarcaciones} and ${not embarcaciones.empty}">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Plazas</th>
                        <th>Longitud (m)</th>
                        <th>Ancho (m)</th>
                        <th>Altura (m)</th>
                        <th>Patrón</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emb : ${embarcaciones}">
                        <td th:text="${emb.registrationNumber}"></td>
                        <td th:text="${emb.name}"></td>
                        <td th:text="${emb.type}"></td>
                        <td th:text="${emb.numSeats}"></td>
                        <td th:text="${emb.length}"></td>
                        <td th:text="${emb.width}"></td>
                        <td th:text="${emb.height}"></td>
                        <td>
                            <span th:if="${emb.patronId != null}" class="badge-success">SÍ</span>
                            <span th:unless="${emb.patronId != null}" class="badge-secondary">NO</span>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <p class="total-count">
                Total de embarcaciones encontradas: <span th:text="${embarcaciones.size()}"></span>
            </p>
        </section>

        <div class="btn-group">
            <a th:href="@{/findEmbarcacionByType}" class="btn btn-primary">Nueva Búsqueda por Tipo</a>
            <a th:href="@{/findEmbarcacionMenu}" class="btn btn-outline-light">Volver al Menú de Búsqueda</a>
            <a th:href="@{/}" class="btn btn-outline-light">Volver al Inicio</a>
        </div>
    </main>
</body>
</html>
