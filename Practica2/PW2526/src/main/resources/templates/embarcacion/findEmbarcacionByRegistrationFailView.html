<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Embarcación No Encontrada</title>
    <link rel="stylesheet" href="stylefail.css">
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>

        <h2 class="titulo-error-w">Embarcación No Encontrada</h2>

        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span>NO SE ENCONTRÓ NINGUNA EMBARCACIÓN CON ESA MATRÍCULA</span>
        </div>

        <p>Verifique que la matrícula introducida sea correcta.</p>

        <div class="action-buttons">
            <a href="/findEmbarcacionByRegistration" class="btn btn-primary">
                <i class="fas fa-redo-alt"></i>
                Intentar de nuevo
            </a>
            <a href="/findEmbarcacionMenu" class="btn btn-outline-light">
                <i class="fas fa-search"></i>
                Volver al Menú de Búsqueda
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                Volver al inicio
            </a>
        </div>
    </div>
</body>

</html>
